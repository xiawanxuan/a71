[build]
# Linux 嵌入式网关交叉编译配置示例
# 部署目标：armv7-unknown-linux-gnueabihf (ARM 32位 Cortex-A 系列)
# 安装命令：rustup target add armv7-unknown-linux-gnueabihf
# 交叉编译命令：cargo build --release --target armv7-unknown-linux-gnueabihf
#
# 若使用 aarch64 (ARM64) 网关：
#   rustup target add aarch64-unknown-linux-gnu
#   cargo build --release --target aarch64-unknown-linux-gnu
#
# 若使用 x86_64 Linux 网关：
#   rustup target add x86_64-unknown-linux-gnu
#   cargo build --release --target x86_64-unknown-linux-gnu
#
# Windows 本地构建需安装 Visual Studio Build Tools (含 C++ 桌面开发) 或 MinGW-w64

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
